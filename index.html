<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO - Ultimate Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f5;
      --fg: #1a1a2e;
      --accent: #ff3366;
      --card-width: 80px;
      --card-height: 120px;
      --uno-red: #e63946;
      --uno-blue: #4361ee;
      --uno-green: #06d6a0;
      --uno-yellow: #ffd60a;
      --uno-purple: #9d4edd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffeaa7 100%);
      color: var(--fg);
      overflow-x: hidden;
      min-height: 100vh;
      user-select: none;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--uno-red); border-radius: 10px; }

    /* Card Styling */
    .uno-card {
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid rgba(255,255,255,0.95);
      background: #fff;
      transform-style: preserve-3d;
    }

    .uno-card::before {
      content: '';
      position: absolute;
      width: 140%;
      height: 170%;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      transform: rotate(-30deg) scale(0.55);
      z-index: 0;
    }

    .card-value {
      position: relative;
      z-index: 2;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: #fff;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
      line-height: 1;
    }

    .uno-card.red { background: linear-gradient(135deg, var(--uno-red) 0%, #ff6b6b 100%); }
    .uno-card.blue { background: linear-gradient(135deg, var(--uno-blue) 0%, #74c0fc 100%); }
    .uno-card.green { background: linear-gradient(135deg, var(--uno-green) 0%, #69db7c 100%); }
    .uno-card.yellow { background: linear-gradient(135deg, var(--uno-yellow) 0%, #ffe066 100%); }
    .uno-card.yellow .card-value { color: #333; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); }
    
    .uno-card.wild-card {
      background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
      border-color: #444;
    }
    .uno-card.wild-card::before {
      background: linear-gradient(135deg, var(--uno-red) 25%, var(--uno-yellow) 25%, var(--uno-yellow) 50%, var(--uno-green) 50%, var(--uno-green) 75%, var(--uno-blue) 75%);
      transform: rotate(-30deg) scale(0.6);
    }
    .uno-card.wild-card .card-value { color: white; text-shadow: 0 0 15px rgba(255,255,255,0.8); }

    .card-back {
      background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
      border: 4px solid #444;
    }
    .card-back::before { display: none; }
    .card-back::after {
      content: 'UNO';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--uno-red);
      transform: rotate(-15deg);
      border: 3px solid var(--uno-red);
      padding: 4px 10px;
      border-radius: 8px;
      text-shadow: none;
    }

    /* Playable Card */
    .uno-card.playable {
      transform: translateY(-35px) scale(1.1);
      z-index: 100;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px rgba(255, 255, 100, 0.8);
    }

    /* Stack Card */
    .uno-card.stackable {
      box-shadow: 0 0 50px rgba(255, 100, 100, 1), 0 0 80px rgba(255, 50, 50, 0.8);
      transform: translateY(-40px) scale(1.15);
    }

    /* Invalid play shake */
    .uno-card.shake {
      animation: card-shake 0.4s ease-in-out;
    }

    @keyframes card-shake {
      0%, 100% { transform: translateX(0) rotate(0); }
      25% { transform: translateX(-10px) rotate(-5deg); }
      75% { transform: translateX(10px) rotate(5deg); }
    }

    /* Card dealing animation */
    @keyframes deal-card {
      0% { 
        transform: translate(-50vw, -50vh) rotate(720deg) scale(0); 
        opacity: 0; 
      }
      100% { 
        transform: translate(0, 0) rotate(0) scale(1); 
        opacity: 1; 
      }
    }

    .dealing {
      animation: deal-card 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
    }

    /* Layout */
    #game-app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, #fff5f5 0%, #ffe4e1 50%, #ffd1dc 100%);
      position: relative;
      overflow: hidden;
    }

    #game-app::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
      z-index: 0;
    }

    .game-table {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-zone {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.5s ease;
    }

    .player-zone.top { top: 15px; left: 50%; transform: translateX(-50%); }
    .player-zone.left { left: 15px; top: 50%; transform: translateY(-50%); }
    .player-zone.right { right: 15px; top: 50%; transform: translateY(-50%); }
    .player-zone.bottom { bottom: 15px; left: 50%; transform: translateX(-50%); }

    /* Turn indicator arrow */
    .turn-arrow {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 20px solid var(--uno-green);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
      z-index: 200;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .player-info {
      background: rgba(255,255,255,0.95);
      padding: 8px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 3px solid transparent;
      transition: all 0.4s;
      cursor: pointer;
      position: relative;
    }

    .player-info.active {
      border-color: var(--uno-green);
      box-shadow: 0 0 25px rgba(6, 214, 160, 0.6);
      transform: scale(1.08);
    }

    /* Blocked state */
    .player-info.blocked {
      position: relative;
      overflow: hidden;
    }

    .player-info.blocked::before {
      content: 'SKIP';
      position: absolute;
      inset: 0;
      background: rgba(230, 57, 70, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.2rem;
      color: white;
      z-index: 10;
      animation: skip-flash 0.3s ease-in-out;
      border-radius: 30px;
    }

    @keyframes skip-flash {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Draw penalty indicator */
    .player-info.must-draw {
      animation: draw-pulse 0.5s infinite alternate;
      border-color: var(--uno-red);
    }

    .player-info.must-draw::after {
      content: attr(data-draw-count);
      position: absolute;
      top: -15px;
      right: -10px;
      background: var(--uno-red);
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      box-shadow: 0 4px 10px rgba(230, 57, 70, 0.5);
      animation: bounce-count 0.5s ease-in-out;
    }

    @keyframes draw-pulse {
      to { box-shadow: 0 0 35px rgba(230, 57, 70, 0.8); }
    }

    @keyframes bounce-count {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Catchable for UNO */
    .player-info.catchable {
      animation: catch-pulse 0.5s infinite alternate;
      border-color: var(--uno-yellow);
      cursor: pointer;
    }

    .player-info.catchable::before {
      content: 'CATCH';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--uno-red);
      color: white;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 800;
    }

    @keyframes catch-pulse {
      to { box-shadow: 0 0 30px rgba(255, 214, 10, 0.8); }
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .card-count-badge {
      background: var(--uno-red);
      color: white;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    /* Timer */
    .timer-ring {
      position: absolute;
      bottom: -45px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .timer-ring .bg {
      stroke: rgba(0,0,0,0.1);
    }

    .timer-ring .progress {
      stroke: var(--uno-green);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear;
    }

    .timer-ring.warning .progress {
      stroke: var(--uno-yellow);
    }

    .timer-ring.danger .progress {
      stroke: var(--uno-red);
    }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
    }

    /* Bot Cards */
    .bot-cards { display: flex; justify-content: center; }

    .bot-cards.horizontal .uno-card {
      margin: 0 -25px;
      transform: scale(0.45);
    }

    .bot-cards.vertical { flex-direction: column; }

    .bot-cards.vertical .uno-card {
      margin: -35px 0;
      transform: scale(0.45);
    }

    /* Partner cards (visible in team mode) */
    .partner-cards {
      display: flex;
      justify-content: center;
      gap: 2px;
    }

    .partner-cards .uno-card {
      transform: scale(0.5);
      margin: 0 -20px;
      cursor: default;
    }

    /* Center Area */
    .center-play-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 30px;
      z-index: 10;
    }

    .deck-pile {
      position: relative;
      width: var(--card-width);
      height: var(--card-height);
    }

    .deck-pile .card-back {
      position: absolute;
      top: 0;
      left: 0;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .deck-pile .card-back:nth-child(1) { transform: translate(2px, 2px); }
    .deck-pile .card-back:nth-child(2) { transform: translate(4px, 4px); }
    .deck-pile:hover .card-back:last-child { transform: translate(6px, 6px) scale(1.05); }

    .discard-pile {
      width: var(--card-width);
      height: var(--card-height);
      background: rgba(255,255,255,0.3);
      border-radius: 12px;
      border: 3px dashed rgba(0,0,0,0.2);
      position: relative;
    }

    .color-indicator {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: background 0.3s;
    }

    /* Stack Counter */
    .stack-counter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
    }

    .stack-counter .plus-icon {
      background: var(--uno-red);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* In-game message */
    .game-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 20px 50px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 2rem;
      z-index: 300;
      animation: message-pop 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes message-pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Player Hand */
    .player-hand-area {
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.95) 100%);
      padding: 20px 10px 30px;
      border-top: 4px solid rgba(255,255,255,1);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
      z-index: 20;
    }

    .hand-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    .hand-container .uno-card { margin: 0 -15px; }

    /* UNO Button */
    .uno-btn-container {
      position: fixed;
      right: 20px;
      bottom: 150px;
      z-index: 50;
    }

    .big-uno-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--uno-red) 0%, #ff6b6b 100%);
      border: 4px solid white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4);
      transition: all 0.2s;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }

    .big-uno-btn.active {
      opacity: 1;
      pointer-events: all;
      transform: scale(1);
      animation: bounce-uno 0.6s infinite;
    }

    @keyframes bounce-uno {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 2.5rem;
      box-shadow: 0 25px 80px rgba(0,0,0,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
    }

    .color-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .color-btn:hover {
      transform: scale(1.2);
      box-shadow: 0 0 30px currentColor;
    }

    .color-btn.red { background: var(--uno-red); color: var(--uno-red); }
    .color-btn.blue { background: var(--uno-blue); color: var(--uno-blue); }
    .color-btn.green { background: var(--uno-green); color: var(--uno-green); }
    .color-btn.yellow { background: var(--uno-yellow); color: var(--uno-yellow); }

    /* Menu Screen */
    .menu-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 30%, #ff9a9e 60%, #fecfef 100%);
      position: relative;
      overflow: hidden;
    }

    .menu-screen::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      animation: float-bg 30s linear infinite;
    }

    @keyframes float-bg {
      from { transform: translate(0, 0); }
      to { transform: translate(-50%, -50%); }
    }

    .menu-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12rem;
      background: linear-gradient(135deg, var(--uno-red) 0%, var(--uno-yellow) 50%, var(--uno-green) 75%, var(--uno-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.1));
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    .mode-card {
      background: rgba(255,255,255,0.95);
      border-radius: 25px;
      padding: 2.5rem;
      width: 280px;
      cursor: pointer;
      transition: all 0.3s;
      border: 4px solid transparent;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;
    }

    .mode-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .mode-card.selected {
      border-color: var(--uno-green);
      box-shadow: 0 0 30px rgba(6, 214, 160, 0.4);
    }

    .mode-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* Lobby Screen */
    .lobby-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffeaa7 100%);
      padding: 20px;
      position: relative;
    }

    .lobby-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 20px;
      padding-top: 20px;
    }

    .lobby-panel {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .profile-card { text-align: center; padding: 30px 20px; }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, var(--uno-purple), var(--uno-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border: 5px solid #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .stat-box {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--uno-red);
    }

    .mascot-display {
      position: relative;
      height: 200px;
      background: linear-gradient(135deg, var(--uno-yellow) 0%, #ffe066 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .mascot-img {
      font-size: 8rem;
      animation: mascot-float 3s ease-in-out infinite;
    }

    @keyframes mascot-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .event-banner {
      background: linear-gradient(135deg, var(--uno-red) 0%, #ff6b6b 100%);
      color: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      position: relative;
      overflow: hidden;
    }

    .event-banner::after {
      content: 'NEW';
      position: absolute;
      top: 10px;
      right: -20px;
      background: var(--uno-yellow);
      color: #333;
      padding: 5px 30px;
      font-size: 0.7rem;
      font-weight: 800;
      transform: rotate(45deg);
    }

    .prepare-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .prepare-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .prepare-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .main-lobby-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    .room-preview {
      background: rgba(255,255,255,0.95);
      border-radius: 25px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
    }

    .player-slots {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 30px 0;
    }

    .player-slot {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      border: 3px dashed #ccc;
      transition: all 0.3s;
    }

    .player-slot.occupied {
      border-style: solid;
      border-color: var(--uno-green);
      background: linear-gradient(135deg, #d3f9d8 0%, #b2f2bb 100%);
    }

    .player-slot.enemy {
      border-color: var(--uno-red);
      background: linear-gradient(135deg, #ffe3e3 0%, #ffc9c9 100%);
    }

    .slot-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #ddd;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .start-game-btn {
      width: 100%;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: 800;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, var(--uno-green) 0%, #69db7c 100%);
      color: white;
      box-shadow: 0 10px 30px rgba(6, 214, 160, 0.3);
    }

    .start-game-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(6, 214, 160, 0.4);
    }

    /* Gacha Animation */
    .gacha-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .gacha-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .gacha-spinner {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 8px solid transparent;
      border-top-color: var(--uno-red);
      border-right-color: var(--uno-yellow);
      border-bottom-color: var(--uno-green);
      border-left-color: var(--uno-blue);
      animation: spin 1s linear infinite;
      margin-bottom: 30px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .gacha-result {
      background: rgba(255,255,255,0.95);
      padding: 30px 50px;
      border-radius: 20px;
      text-align: center;
      transform: scale(0);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .gacha-overlay.active .gacha-result {
      transform: scale(1);
      transition-delay: 1.5s;
    }

    .result-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    /* Screen Management */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* Game Over Results */
    .results-container {
      width: 100%;
      max-width: 600px;
    }

    .results-player {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 15px;
      margin-bottom: 10px;
      transition: all 0.3s;
    }

    .results-player.winner {
      background: linear-gradient(135deg, #d3f9d8 0%, #b2f2bb 100%);
      transform: scale(1.02);
    }

    .results-rank {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--uno-red);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .results-player.winner .results-rank {
      background: var(--uno-green);
    }

    .results-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .results-cards .uno-card {
      transform: scale(0.4);
      margin: -25px;
    }

    .results-points {
      margin-left: auto;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--uno-red);
    }

    @media (max-width: 1024px) {
      .lobby-container { grid-template-columns: 1fr; }
      .menu-logo { font-size: 8rem; }
    }

    @media (max-width: 640px) {
      :root { --card-width: 60px; --card-height: 90px; }
      .card-value { font-size: 2.5rem; }
      .menu-logo { font-size: 5rem; }
      .mode-card { width: 100%; }
      .lobby-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- GACHA OVERLAY -->
  <div id="gacha-overlay" class="gacha-overlay">
    <div class="gacha-spinner"></div>
    <div class="gacha-result" id="gacha-result"></div>
  </div>

  <!-- GAME MESSAGE -->
  <div id="game-message" class="game-message" style="display: none;"></div>

  <!-- MAIN MENU SCREEN -->
  <div id="menu-screen" class="menu-screen screen active">
    <h1 class="menu-logo">UNO</h1>
    <p class="text-xl text-gray-600 mb-12 font-semibold relative z-10">Choose Your Game Mode</p>
    
    <div class="flex flex-wrap justify-center gap-8">
      <div class="mode-card" data-mode="solo" onclick="selectMode('solo')">
        <div class="mode-icon" style="background: linear-gradient(135deg, var(--uno-blue), #74c0fc);">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>

        <div class="mt-4 flex justify-center gap-2">
          <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-semibold">1v3</span>
        </div>
      </div>

      <div class="mode-card" data-mode="2v2" onclick="selectMode('2v2')">
        <div class="mode-icon" style="background: linear-gradient(135deg, var(--uno-red), #ff6b6b);">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="white" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <h3 class="text-2xl font-bold text-gray-800 mb-2">2v2 Team</h3>
        <p class="text-gray-500 text-sm">Partner up! See partner cards!</p>
        <div class="mt-4 flex justify-center gap-2">
          <span class="px-3 py-1 bg-red-100 text-red-600 rounded-full text-xs font-semibold">2vs2</span>
        </div>
      </div>
    </div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="lobby-screen screen">
    <div class="lobby-container">
      <div class="lobby-panel profile-card">
        <div class="profile-avatar" id="profile-avatar">😊</div>
        <input type="text" id="player-name-input" value="Player" 
               class="w-full text-center text-xl font-bold bg-transparent border-b-2 border-gray-200 focus:border-red-400 outline-none py-2 mb-4">
        
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-value">156</div>
            <div class="text-xs text-gray-500 font-semibold">GAMES</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">72%</div>
            <div class="text-xs text-gray-500 font-semibold">WIN RATE</div>
          </div>
        </div>
      </div>

      <div class="main-lobby-area">
        <div class="w-full max-w-md">
          <div class="mascot-display">
            <div class="mascot-img">🦄</div>
          </div>
        </div>

        <div class="room-preview">
          <h3 class="text-2xl font-bold text-center text-gray-800 mb-2" id="lobby-title">Solo Mode</h3>
          <div class="player-slots" id="player-slots"></div>

      <div>
        <div class="lobby-panel mb-4">
          <h4 class="font-bold text-gray-700 mb-3">Events</h4>
          <div class="event-banner">

          <h4 class="font-bold text-gray-700 mb-3">Prepare</h4>
          <div class="prepare-item" onclick="backToMenu()">
            <div class="prepare-icon" style="background: linear-gradient(135deg, #868e96, #adb5bd);">←</div>

  <!-- GAME SCREEN -->
  <div id="game-app" class="screen">
    <div class="game-table" id="game-table"></div>

    <div class="center-play-area" id="center-play-area">
      <div class="deck-pile" id="draw-pile">
        <div class="uno-card card-back"></div>
        <div class="uno-card card-back"></div>
        <div class="uno-card card-back"></div>

  <!-- COLOR PICKER MODAL -->
  <div id="color-picker" class="modal-overlay">
    <div class="glass-panel p-10 flex flex-col items-center gap-6 text-center">
      <h3 class="text-3xl font-bold text-gray-800">Choose a Color</h3>
      <div class="flex gap-4 flex-wrap justify-center">
        <button class="color-btn red" data-color="red"></button>
        <button class="color-btn blue" data-color="blue"></button>

  <!-- GAME OVER MODAL -->
  <div id="game-over" class="modal-overlay">
    <div class="glass-panel p-8 flex flex-col items-center gap-4 text-center">
      <div class="text-6xl" id="result-emoji">🎉</div>
      <h2 id="winner-text" class="text-4xl font-bold text-gray-800">GAME OVER</h2>
      <div class="results-container" id="results-container"></div>
      <div class="flex gap-4 mt-4 flex-wrap justify-center">
        <button id="btn-restart" class="px-8 py-3 bg-gradient-to-r from-green-500 to-green-400 rounded-xl font-bold text-white hover:from-green-400 hover:to-green-300 transition shadow-lg">Play Again</button>
        <button id="btn-lobby" class="px-8 py-3 bg-gradient-to-r from-gray-500 to-gray-400 rounded-xl font-bold text-white hover:from-gray-400 hover:to-gray-300 transition shadow-lg">Lobby</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================
    // --- AUDIO SYSTEM ---
    // ==========================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      
      const sounds = {
        card: { type: 'triangle', freq: [600, 300], dur: 0.08, vol: 0.06 },
        win: { type: 'sine', freq: [523.25, 659.25, 783.99], dur: 0.6, vol: 0.08 },
        lose: { type: 'sawtooth', freq: [200, 100], dur: 0.4, vol: 0.06 },
        draw: { type: 'sine', freq: [400, 400], dur: 0.04, vol: 0.03 },
        skip: { type: 'square', freq: [150, 100], dur: 0.15, vol: 0.05 },
        timer: { type: 'sine', freq: [800, 600], dur: 0.1, vol: 0.04 }
      };
      
      const s = sounds[type];
      if(!s) return;

      osc.type = s.type;
      osc.frequency.setValueAtTime(s.freq[0], t);
      if(s.freq.length > 2) {
        osc.frequency.setValueAtTime(s.freq[0], t);
        osc.frequency.setValueAtTime(s.freq[1], t + s.dur/3);
        osc.frequency.setValueAtTime(s.freq[2], t + 2*s.dur/3);
      } else if(s.freq[0] !== s.freq[1]) {
        osc.frequency.exponentialRampToValueAtTime(s.freq[1], t + s.dur);
      }
      
      g.gain.setValueAtTime(s.vol, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + s.dur);
      
      osc.start(t);
      osc.stop(t + s.dur);
    }

    // ==========================
    // --- GAME CONFIG ---
    // ==========================
    const COLORS = ['red', 'blue', 'green', 'yellow'];
    const SPECIAL_VALUES = ['S', 'R', '+2'];
    const WILD_VALUES = ['W', '+4'];
    
    const BOT_NAMES = ['Alex', 'Blake', 'Casey', 'Drew', 'Ellis'];
    const BOT_AVATARS = ['😎', '🤖', '🎭', '👾', '🦊'];
    const TEAM_COLORS = ['#e63946', '#4361ee'];
    const TURN_TIME = 10;

    let gameMode = 'solo';
    let state = {
      deck: [], 
      discard: [], 
      players: [], 
      turn: 0,
      dir: 1,
      activeColor: 'red',
      isOver: false, 
      active: false,
      saidUno: false,
      pendingWild: null,
      teams: [],
      drawStack: 0,
      vulnerablePlayer: null,
      stackType: null,
      timer: TURN_TIME,
      timerInterval: null,
      blockedPlayer: null,
      mustDrawPlayer: null
    };

    // ==========================
    // --- SPA NAVIGATION ---
    // ==========================
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ==========================
    // --- GAME MESSAGE ---
    // ==========================
    function showGameMessage(text, duration = 1500) {
      const msgEl = document.getElementById('game-message');
      msgEl.textContent = text;
      msgEl.style.display = 'block';
      setTimeout(() => {
        msgEl.style.display = 'none';
      }, duration);
    }

    // ==========================
    // --- DECK & UTILITIES ---
    // ==========================
    function createDeck() {
      let d = [];
      COLORS.forEach(c => {
        d.push({ c, v: '0' });
        for (let i=1; i<=9; i++) {
          d.push({c, v: i.toString()}); 
          d.push({c, v: i.toString()}); 
        }
        SPECIAL_VALUES.forEach(v => { d.push({c, v}); d.push({c, v}); });
      });
      for(let i=0; i<4; i++) { 
        d.push({c: 'black', v: 'W'}); 
        d.push({c: 'black', v: '+4'}); 
      }
      return shuffle(d);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function getRandomBot() {
      return {
        name: BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)],
        avatar: BOT_AVATARS[Math.floor(Math.random() * BOT_AVATARS.length)]
      };
    }

    // ==========================
    // --- RENDERING ---
    // ==========================
    function renderCard(card, isBack = false) {
      const el = document.createElement('div');
      el.className = `uno-card ${isBack ? 'card-back' : card.c} ${card.c === 'black' ? 'wild-card' : ''}`;
      
      let sym = card.v;
      if (sym === 'S') sym = '⊘'; 
      if (sym === 'R') sym = '⟲'; 
      
      if (!isBack) el.innerHTML = `<span class="card-value">${sym}</span>`;
      return el;
    }

    function updateUI() {
      const top = state.discard[state.discard.length - 1];
      if (top) {
        const discardPile = document.getElementById('discard-pile');
        discardPile.innerHTML = '';
        const cardEl = renderCard(top);
        cardEl.style.animation = 'none';
        discardPile.appendChild(cardEl);
      }
      
      const colorIndicator = document.getElementById('color-indicator');
      const cmap = { 
        red: 'var(--uno-red)', 
        blue: 'var(--uno-blue)', 
        green: 'var(--uno-green)', 
        yellow: 'var(--uno-yellow)' 
      };
      colorIndicator.style.background = cmap[state.activeColor] || 'transparent';

      // UNO button
      const unoBtn = document.getElementById('uno-btn');
      if (state.turn === 0 && state.players[0].hand.length === 2 && state.active && !state.saidUno) {
        unoBtn.classList.add('active');
      } else {
        unoBtn.classList.remove('active');
      }

      // Stack counter
      updateStackCounter();
    }

    function updateStackCounter() {
      const centerArea = document.getElementById('center-play-area');
      let stackEl = centerArea.querySelector('.stack-counter');
      
      if (state.drawStack > 0) {
        if (!stackEl) {
          stackEl = document.createElement('div');
          stackEl.className = 'stack-counter';
          centerArea.appendChild(stackEl);
        }
        stackEl.innerHTML = `<div class="plus-icon">+</div><span>${state.drawStack}</span>`;
      } else if (stackEl) {
        stackEl.remove();
      }
    }

    function renderHand() {
      const handContainer = document.getElementById('player-hand');
      handContainer.innerHTML = '';
      const me = state.players[0];
      const isMyTurn = state.turn === 0;

      me.hand.forEach((card, idx) => {
        const el = renderCard(card);
        let valid = false;
        let isStackCard = false;

        if (isMyTurn && state.active) {
          if (state.drawStack > 0) {
            if (canStackCard(card)) {
              valid = true;
              isStackCard = true;
            }
          } else {
            valid = checkValidPlay(card);
          }
        }

        if (valid) {
          el.classList.add('playable');
          if (isStackCard) el.classList.add('stackable');
        }

        // All cards are clickable
        el.onclick = () => {
          if (!state.active) return;
          if (valid) {
            executePlayerTurn(idx);
          } else if (isMyTurn) {
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 400);
          }
        };
        handContainer.appendChild(el);
      });
    }

    function renderGameTable() {
      const gameTable = document.getElementById('game-table');
      gameTable.innerHTML = '';

      const playerCount = state.players.length;
      const positions = getPlayerPositions(playerCount);

      // Find partner index for team mode
      let partnerIdx = -1;
      if (gameMode === '2v2' && state.teams[0] !== undefined) {
        partnerIdx = state.teams.findIndex((t, i) => t === state.teams[0] && i !== 0);
      }

      state.players.forEach((player, idx) => {
        if (idx === 0) return;

        const zone = document.createElement('div');
        zone.className = `player-zone ${positions[idx]}`;

        const info = document.createElement('div');
        info.className = `player-info ${state.turn === idx ? 'active' : ''}`;
        
        // Blocked state
        if (state.blockedPlayer === idx) {
          info.classList.add('blocked');
        }
        
        // Must draw state
        if (state.mustDrawPlayer === idx) {
          info.classList.add('must-draw');
          info.setAttribute('data-draw-count', `+${state.drawStack}`);
        }
        
        // Catchable for UNO
        if (state.vulnerablePlayer === idx && state.turn === 0) {
          info.classList.add('catchable');
          info.onclick = () => catchUno(idx);
        }
        
        if (gameMode === '2v2' && state.teams[idx] !== undefined) {
          info.style.borderColor = TEAM_COLORS[state.teams[idx]];
        }
        
        info.innerHTML = `
          <div class="player-avatar" style="background: ${getPlayerColor(idx)}">${player.avatar}</div>
          <div>
            <div class="font-bold text-gray-800">${player.name}</div>
            <div class="card-count-badge">${player.hand.length}</div>
          </div>
        `;
        
        zone.appendChild(info);

        // Cards display
        const cardsDiv = document.createElement('div');
        
        // Show partner cards in team mode
        if (partnerIdx === idx && gameMode === '2v2') {
          cardsDiv.className = 'partner-cards';
          player.hand.forEach(card => {
            const cardEl = renderCard(card);
            cardsDiv.appendChild(cardEl);
          });
        } else {
          cardsDiv.className = `bot-cards ${positions[idx] === 'left' || positions[idx] === 'right' ? 'vertical' : 'horizontal'}`;
          const displayCount = Math.min(player.hand.length, 7);
          for (let i = 0; i < displayCount; i++) {
            const card = document.createElement('div');
            card.className = 'uno-card card-back';
            cardsDiv.appendChild(card);
          }
        }
        
        zone.appendChild(cardsDiv);
        gameTable.appendChild(zone);
      });

      // Main player zone
      const mainZone = document.createElement('div');
      mainZone.className = 'player-zone bottom';
      
      const mainInfo = document.createElement('div');
      mainInfo.className = `player-info ${state.turn === 0 ? 'active' : ''}`;
      if (state.vulnerablePlayer === 0) mainInfo.classList.add('catchable');
      if (state.mustDrawPlayer === 0) {
        mainInfo.classList.add('must-draw');
        mainInfo.setAttribute('data-draw-count', `+${state.drawStack}`);
      }
      if (gameMode === '2v2') mainInfo.style.borderColor = TEAM_COLORS[state.teams[0]];
      
      mainInfo.innerHTML = `
        <div class="player-avatar" style="background: ${getPlayerColor(0)}">${state.players[0].avatar}</div>
        <div>
          <div class="font-bold text-gray-800">${state.players[0].name}</div>
          <div class="card-count-badge">${state.players[0].hand.length}</div>
        </div>
      `;
      
      // Timer for main player
      if (state.turn === 0 && state.active) {
        const timerDiv = document.createElement('div');
        timerDiv.className = 'timer-ring';
        timerDiv.id = 'timer-ring';
        
        const circumference = 2 * Math.PI * 16;
        const offset = circumference - (state.timer / TURN_TIME) * circumference;
        
        timerDiv.innerHTML = `
          <svg width="40" height="40">
            <circle class="bg" cx="20" cy="20" r="16"></circle>
            <circle class="progress" cx="20" cy="20" r="16" 
                    stroke-dasharray="${circumference}" 
                    stroke-dashoffset="${offset}"></circle>
          </svg>
          <div class="timer-text">${state.timer}</div>
        `;
        
        if (state.timer <= 3) timerDiv.classList.add('danger');
        else if (state.timer <= 5) timerDiv.classList.add('warning');
        
        mainInfo.appendChild(timerDiv);
      }
      
      mainZone.appendChild(mainInfo);
      gameTable.appendChild(mainZone);
    }

    function getPlayerPositions(count) {
      if (count === 2) return { 0: 'bottom', 1: 'top' };
      if (count === 3) return { 0: 'bottom', 1: 'right', 2: 'left' };
      if (count === 4) return { 0: 'bottom', 1: 'right', 2: 'top', 3: 'left' };
      return { 0: 'bottom', 1: 'top', 2: 'left', 3: 'right', 4: 'top' };
    }

    function getPlayerColor(idx) {
      const colors = ['#e63946', '#4361ee', '#06d6a0', '#ffd60a', '#9d4edd'];
      return colors[idx % colors.length];
    }

    // ==========================
    // --- TIMER SYSTEM ---
    // ==========================
    function startTimer() {
      stopTimer();
      state.timer = TURN_TIME;
      updateTimerDisplay();
      
      state.timerInterval = setInterval(() => {
        state.timer--;
        updateTimerDisplay();
        
        if (state.timer <= 3 && state.timer > 0) {
          playSound('timer');
        }
        
        if (state.timer <= 0) {
          stopTimer();
          handleTimeout();
        }
      }, 1000);
    }

    function stopTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
    }

    function updateTimerDisplay() {
      const timerRing = document.getElementById('timer-ring');
      if (!timerRing) return;
      
      const progress = timerRing.querySelector('.progress');
      const text = timerRing.querySelector('.timer-text');
      
      if (progress && text) {
        const circumference = 2 * Math.PI * 16;
        const offset = circumference - (state.timer / TURN_TIME) * circumference;
        progress.style.strokeDashoffset = offset;
        text.textContent = state.timer;
        
        timerRing.classList.remove('warning', 'danger');
        if (state.timer <= 3) timerRing.classList.add('danger');
        else if (state.timer <= 5) timerRing.classList.add('warning');
      }
    }

    function handleTimeout() {
      if (state.turn !== 0) return;
      
      showGameMessage('Time Out!');
      
      // If stack exists, draw all
      if (state.drawStack > 0) {
        const drawn = drawCards(state.drawStack);
        state.players[0].hand.push(...drawn);
        state.drawStack = 0;
        state.stackType = null;
        state.mustDrawPlayer = null;
      }
      
      advanceTurn();
    }

    // ==========================
    // --- GAME LOGIC ---
    // ==========================
    function checkValidPlay(card) {
      const top = state.discard[state.discard.length - 1];
      if (!top) return true;
      if (card.c === 'black') return true;
      if (card.c === state.activeColor) return true;
      if (card.v === top.v) return true;
      return false;
    }

    function canStackCard(card) {
      if (state.stackType === '+2') {
        return card.v === '+2';
      } else if (state.stackType === '+4') {
        return card.v === '+4';
      }
      return false;
    }

    function drawCards(count = 1) {
      let drawn = [];
      for(let i = 0; i < count; i++) {
        if (state.deck.length === 0) {
          if(state.discard.length <= 1) break;
          const topCard = state.discard.pop();
          state.deck = shuffle(state.discard);
          state.discard = [topCard];
        }
        if(state.deck.length > 0) drawn.push(state.deck.pop());
      }
      return drawn;
    }

    async function animateDraw(playerIdx, count) {
      const player = state.players[playerIdx];
      
      for (let i = 0; i < count; i++) {
        const card = drawCards(1)[0];
        if (!card) break;
        
        player.hand.push(card);
        playSound('draw');
        
        if (playerIdx === 0) {
          renderHand();
        } else {
          renderGameTable();
        }
        
        await sleep(150);
      }
    }

    async function playCard(pIdx, cIdx) {
      const player = state.players[pIdx];
      const card = player.hand.splice(cIdx, 1)[0];
      state.discard.push(card);
      state.vulnerablePlayer = null;
      state.blockedPlayer = null;
      state.mustDrawPlayer = null;
      
      playSound('card');

      // Handle stacking
      if (card.v === '+2') {
        state.drawStack += 2;
        state.stackType = '+2';
      } else if (card.v === '+4') {
        state.drawStack += 4;
        state.stackType = '+4';
      } else {
        state.drawStack = 0;
        state.stackType = null;
      }

      // Check win
      if (player.hand.length === 0) {
        if (pIdx === 0 && !state.saidUno) {
          await animateDraw(0, 4);
          showGameMessage('Forgot UNO! +4 cards');
          renderHand();
          updateUI();
          return;
        }
        stopTimer();
        setTimeout(() => endGame(pIdx), 500);
        updateUI();
        return;
      }

      // Set vulnerable if has 1 card
      if (player.hand.length === 1) {
        state.vulnerablePlayer = pIdx;
      }

      // Bot auto UNO
      if (pIdx !== 0 && player.hand.length === 1) {
        state.vulnerablePlayer = null;
      }

      // Handle wild
      if (card.c === 'black') {
        if (pIdx === 0) {
          state.pendingWild = card;
          document.getElementById('color-picker').classList.add('active');
          updateUI();
          return;
        } else {
          state.activeColor = chooseBotColor(player.hand);
        }
      } else {
        state.activeColor = card.c;
      }

      await applyCardEffect(card, pIdx);
      advanceTurn();
    }

    async function applyCardEffect(card, currentPIdx) {
      const nextIdx = getNextPlayerIdx();
      const nextPlayer = state.players[nextIdx];
      
      // Only apply skip effects if not stacking
      if (state.drawStack === 0) {
        if (card.v === 'S') {
          state.blockedPlayer = nextIdx;
          renderGameTable();
          showGameMessage(`${nextPlayer.name} Skipped!`);
          playSound('skip');
          await sleep(1200);
          state.blockedPlayer = null;
          state.turn = nextIdx;
        } else if (card.v === 'R') {
          state.dir *= -1;
          showGameMessage('Reversed!');
          await sleep(800);
          if (state.players.length === 2) {
            state.blockedPlayer = nextIdx;
            renderGameTable();
            playSound('skip');
            await sleep(1200);
            state.blockedPlayer = null;
            state.turn = nextIdx;
          }
        }
      }
      
      // Check if next player must draw stack
      if (state.drawStack > 0) {
        const canStack = nextPlayer.hand.some(c => canStackCard(c));
        
        if (!canStack) {
          state.mustDrawPlayer = nextIdx;
          renderGameTable();
          await sleep(800);
          
          await animateDraw(nextIdx, state.drawStack);
          showGameMessage(`${nextPlayer.name} drew ${state.drawStack} cards!`);
          
          state.drawStack = 0;
          state.stackType = null;
          state.mustDrawPlayer = null;
          state.turn = nextIdx;
        }
      }
    }

    function getNextPlayerIdx() {
      let next = state.turn + state.dir;
      if (next >= state.players.length) next = 0;
      if (next < 0) next = state.players.length - 1;
      return next;
    }

    function advanceTurn() {
      state.turn = getNextPlayerIdx();
      state.saidUno = false;
      
      updateUI();
      renderHand();
      renderGameTable();
      
      if (state.players[state.turn].isBot) {
        const thinkTime = 1000 + Math.random() * 1500;
        setTimeout(botTurn, thinkTime);
      } else {
        startTimer();
      }
    }

    async function catchUno(playerIdx) {
      if (state.vulnerablePlayer !== playerIdx) return;
      if (state.turn !== 0) return;
      
      playSound('card');
      
      const victim = state.players[playerIdx];
      await animateDraw(playerIdx, 2);
      showGameMessage(`${victim.name} caught! +2 cards`);
      
      state.vulnerablePlayer = null;
      renderGameTable();
      renderHand();
    }

    // ==========================
    // --- BOT AI ---
    // ==========================
    async function botTurn() {
      if (state.isOver || !state.active) return;
      
      const p = state.players[state.turn];
      
      // Bot can catch player's UNO
      if (state.vulnerablePlayer === 0 && Math.random() > 0.4) {
        await catchUno(0);
      }
      
      // Bot handles stack
      if (state.drawStack > 0) {
        const stackCardIdx = p.hand.findIndex(c => canStackCard(c));
        if (stackCardIdx !== -1) {
          showGameMessage(`${p.name} stacks!`);
          await sleep(500);
          playCard(state.turn, stackCardIdx);
          return;
        } else {
          state.mustDrawPlayer = state.turn;
          renderGameTable();
          await sleep(800);
          
          await animateDraw(state.turn, state.drawStack);
          showGameMessage(`${p.name} drew ${state.drawStack} cards!`);
          
          state.drawStack = 0;
          state.stackType = null;
          state.mustDrawPlayer = null;
          advanceTurn();
          return;
        }
      }

      let validMoves = [];
      p.hand.forEach((card, index) => {
        if(checkValidPlay(card)) validMoves.push({card, index});
      });

      if (validMoves.length > 0) {
        validMoves.sort((a, b) => getCardPriority(b.card) - getCardPriority(a.card));
        const choice = validMoves[0];
        await sleep(300);
        playCard(state.turn, choice.index);
      } else {
        await animateDraw(state.turn, 1);
        showGameMessage(`${p.name} drew a card`);
        
        const drawnCard = p.hand[p.hand.length - 1];
        if(drawnCard && checkValidPlay(drawnCard)) {
          await sleep(600);
          playCard(state.turn, p.hand.length - 1);
        } else {
          advanceTurn();
        }
      }
    }

    function getCardPriority(card) {
      if(card.v === '+4') return 100;
      if(card.v === '+2') return 90;
      if(card.v === 'S' || card.v === 'R') return 50;
      if(card.c !== 'black') return 20;
      return 10;
    }

    function chooseBotColor(hand) {
      let counts = { red: 0, blue: 0, green: 0, yellow: 0 };
      hand.forEach(c => { if (c.c !== 'black') counts[c.c]++; });
      return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
    }

    // ==========================
    // --- MENU & LOBBY ---
    // ==========================
    function selectMode(mode) {
      gameMode = mode;
      
      document.querySelectorAll('.mode-card').forEach(card => {
        card.classList.remove('selected');
      });
      document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');
      
      setTimeout(() => {
        showScreen('lobby-screen');
        setupLobby();
      }, 300);
    }

    function setupLobby() {
      const lobbyTitle = document.getElementById('lobby-title');
      const slotsContainer = document.getElementById('player-slots');
      
      slotsContainer.innerHTML = '';
      
      if (gameMode === 'solo') {
        lobbyTitle.textContent = 'Solo Mode - 1 vs 3';
        slotsContainer.innerHTML = `
          <div class="player-slot occupied">
            <div class="slot-avatar">😊</div>
            <div class="font-semibold text-gray-700">You</div>
          </div>
          <div class="player-slot"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Bot 1</div></div>
          <div class="player-slot"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Bot 2</div></div>
          <div class="player-slot"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Bot 3</div></div>
        `;
      } else {
        lobbyTitle.textContent = '2v2 Team Mode - See Partner Cards!';
        slotsContainer.innerHTML = `
          <div class="player-slot occupied">
            <div class="slot-avatar" style="border: 3px solid ${TEAM_COLORS[0]}">😊</div>
            <div class="font-semibold text-gray-700">You</div>
          </div>
          <div class="player-slot"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Partner</div></div>
          <div class="player-slot enemy"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Enemy 1</div></div>
          <div class="player-slot enemy"><div class="slot-avatar">❓</div><div class="font-semibold text-gray-400">Enemy 2</div></div>
        `;
      }
    }

    function backToMenu() {
      showScreen('menu-screen');
    }

    async function startMatching() {
      const gachaOverlay = document.getElementById('gacha-overlay');
      const gachaResult = document.getElementById('gacha-result');
      
      gachaOverlay.classList.add('active');
      gachaResult.innerHTML = '';
      
      await sleep(2000);
      
      const opponents = [];
      for (let i = 0; i < 3; i++) opponents.push(getRandomBot());
      
      let resultHTML = '<div class="text-xl font-bold text-gray-700 mb-4">Match Found!</div><div class="flex gap-4 flex-wrap justify-center">';
      
      opponents.forEach((bot, i) => {
        const isPartner = gameMode === '2v2' && i === 0;
        const isEnemy = gameMode === '2v2' && i > 0;
        resultHTML += `
          <div class="text-center">
            <div class="result-avatar" style="background: ${getPlayerColor(i+1)}">${bot.avatar}</div>
            <div class="font-bold text-gray-700">${bot.name}</div>
            <div class="text-xs ${isPartner ? 'text-green-500' : isEnemy ? 'text-red-500' : 'text-gray-500'}">
              ${isPartner ? 'Partner' : isEnemy ? 'Enemy' : 'Opponent'}
            </div>
          </div>
        `;
      });
      
      resultHTML += '</div>';
      gachaResult.innerHTML = resultHTML;
      
      await sleep(2000);
      
      gachaOverlay.classList.remove('active');
      initGame(opponents);
    }

    // ==========================
    // --- INITIALIZATION ---
    // ==========================
    async function initGame(opponents) {
      initAudio();
      
      const pName = document.getElementById('player-name-input').value || 'Player';
      
      state = {
        deck: createDeck(),
        discard: [],
        players: [{
          name: pName,
          avatar: '😊',
          hand: [],
          isBot: false
        }],
        turn: 0,
        dir: 1,
        isOver: false,
        active: true,
        saidUno: false,
        pendingWild: null,
        teams: gameMode === '2v2' ? [0] : [],
        drawStack: 0,
        stackType: null,
        vulnerablePlayer: null,
        timer: TURN_TIME,
        timerInterval: null,
        blockedPlayer: null,
        mustDrawPlayer: null
      };
      
      opponents.forEach((bot, i) => {
        state.players.push({
          name: bot.name,
          avatar: bot.avatar,
          hand: [],
          isBot: true
        });
        if (gameMode === '2v2') state.teams.push(i === 0 ? 0 : 1);
      });

      showScreen('game-app');

      // Deal cards with animation
      for(let i = 0; i < 7; i++) {
        for(let p of state.players) {
          p.hand.push(drawCards()[0]);
          playSound('draw');
          
          if (p.isBot) {
            renderGameTable();
          } else {
            renderHand();
          }
          
          await sleep(80);
        }
      }

      let startCard = drawCards()[0];
      while(startCard.c === 'black' || SPECIAL_VALUES.includes(startCard.v)) {
        state.deck.unshift(startCard);
        state.deck = shuffle(state.deck);
        startCard = drawCards()[0];
      }
      state.discard.push(startCard);
      state.activeColor = startCard.c;
      
      playSound('card');
      updateUI();
      renderHand();
      renderGameTable();
      
      showGameMessage('Game Started!', 1500);
      startTimer();
    }

    // ==========================
    // --- POINT CALCULATION ---
    // ==========================
    function calculatePoints(hand) {
      let points = 0;
      hand.forEach(card => {
        if (card.v === 'W' || card.v === '+4') points += 50;
        else if (SPECIAL_VALUES.includes(card.v)) points += 20;
        else points += parseInt(card.v) || 0;
      });
      return points;
    }

    function endGame(winner) {
      state.isOver = false;
      state.active = false;
      stopTimer();
      
      const isWin = winner === 0 || (gameMode === '2v2' && state.teams[winner] === 0);
      
      // Calculate results
      const results = state.players.map((p, idx) => ({
        name: p.name,
        avatar: p.avatar,
        hand: [...p.hand],
        points: calculatePoints(p.hand),
        isWinner: idx === winner,
        isTeam: gameMode === '2v2' ? state.teams[idx] : null
      })).sort((a, b) => a.points - b.points);
      
      // Find winner and move to front
      const winnerIdx = results.findIndex(r => r.isWinner);
      if (winnerIdx > 0) {
        const winnerData = results.splice(winnerIdx, 1)[0];
        results.unshift(winnerData);
      }
      
      document.getElementById('result-emoji').textContent = isWin ? '🎉' : '😢';
      document.getElementById('winner-text').textContent = isWin ? 'YOU WIN!' : 'YOU LOSE';
      
      const resultsContainer = document.getElementById('results-container');
      resultsContainer.innerHTML = results.map((r, idx) => `
        <div class="results-player ${r.isWinner ? 'winner' : ''}">
          <div class="results-rank">${idx + 1}</div>
          <div class="player-avatar" style="background: ${getPlayerColor(state.players.findIndex(p => p.name === r.name))}; width: 40px; height: 40px; font-size: 1.2rem;">${r.avatar}</div>
          <div>
            <div class="font-bold text-gray-800">${r.name}</div>
            <div class="results-cards">
              ${r.hand.map(c => {
                const el = renderCard(c);
                el.style.cursor = 'default';
                return el.outerHTML;
              }).join('')}
            </div>
          </div>
          <div class="results-points">${r.points} pts</div>
        </div>
      `).join('');
      
      document.getElementById('game-over').classList.add('active');
      
      if(isWin) playSound('win'); else playSound('lose');
    }

    function executePlayerTurn(cardIndex) {
      if (state.turn !== 0 || state.isOver || !state.active) return;
      stopTimer();
      playCard(0, cardIndex);
    }

    // ==========================
    // --- EVENT LISTENERS ---
    // ==========================
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('btn-restart').addEventListener('click', () => {
        document.getElementById('game-over').classList.remove('active');
        showScreen('lobby-screen');
        setupLobby();
      });
      
      document.getElementById('btn-lobby').addEventListener('click', () => {
        document.getElementById('game-over').classList.remove('active');
        showScreen('lobby-screen');
        setupLobby();
      });

      document.getElementById('draw-pile').addEventListener('click', async () => {
        if (state.turn !== 0 || state.isOver || !state.active) return;
        stopTimer();
        
        if (state.drawStack > 0) {
          state.mustDrawPlayer = 0;
          renderGameTable();
          await animateDraw(0, state.drawStack);
          showGameMessage(`You drew ${state.drawStack} cards!`);
          state.drawStack = 0;
          state.stackType = null;
          state.mustDrawPlayer = null;
          renderHand();
          updateUI();
          advanceTurn();
          return;
        }
        
        await animateDraw(0, 1);
        showGameMessage('You drew 1 card');
        
        renderHand();
        updateUI();
        
        const drawnCard = state.players[0].hand[state.players[0].hand.length - 1];
        if (!checkValidPlay(drawnCard)) {
          await sleep(500);
          showGameMessage('No valid play');
          advanceTurn();
        } else {
          startTimer();
        }
      });

      document.getElementById('uno-btn').addEventListener('click', () => {
        if (state.turn === 0 && state.players[0].hand.length === 2) {
          state.saidUno = true;
          state.vulnerablePlayer = null;
          document.getElementById('uno-btn').classList.remove('active');
          showGameMessage('UNO!');
          renderGameTable();
        }
      });

      document.querySelectorAll('.color-btn').forEach(b => {
        b.addEventListener('click', async () => {
          if(!state.pendingWild) return;
          
          state.activeColor = b.dataset.color;
          document.getElementById('color-picker').classList.remove('active');
          
          await applyCardEffect(state.pendingWild, 0);
          state.pendingWild = null;
          
          advanceTurn();
        });
      });

      document.addEventListener('keydown', e => {
        if (state.isOver || !state.active) return;
        if (e.key === 'u' || e.key === 'U') document.getElementById('uno-btn').click();
        if (e.key === 'd' || e.key === 'D') document.getElementById('draw-pile').click();
      });
    });
  </script>
</body>
