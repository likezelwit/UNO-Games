<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO - Fun Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-bright: linear-gradient(135deg, #ffeb3b 0%, #fdd835 20%, #8bc34a 50%, #4caf50 80%, #03a9f4 100%);
      --card-width: 80px;
      --card-height: 120px;
      --uno-red: #e63946;
      --uno-blue: #1d3557;
      --uno-green: #2a9d8f;
      --uno-yellow: #e9c46a;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-bright);
      color: #333;
      overflow: hidden;
      height: 100vh;
      user-select: none;
      perspective: 1200px;
    }

    /* --- Card Styling --- */
    .uno-card {
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.2s;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      background: #fff;
    }

    .uno-card::before {
      content: '';
      position: absolute;
      width: 140%;
      height: 160%;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      transform: rotate(-30deg) scale(0.5);
      z-index: 0;
    }

    .card-value {
      position: relative;
      z-index: 2;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: rgba(0,0,0,0.8);
      line-height: 1;
    }

    .uno-card.red { background: var(--uno-red); border-color: rgba(255,255,255,0.8); }
    .uno-card.blue { background: var(--uno-blue); border-color: rgba(255,255,255,0.8); }
    .uno-card.green { background: var(--uno-green); border-color: rgba(255,255,255,0.8); }
    .uno-card.yellow { background: var(--uno-yellow); border-color: rgba(255,255,255,0.8); }
    
    .uno-card.wild-card { background: #222; border-color: #444; }
    .uno-card.wild-card::before {
        background: conic-gradient(var(--uno-red), var(--uno-yellow), var(--uno-green), var(--uno-blue), var(--uno-red));
        transform: rotate(-30deg) scale(0.6);
    }
    .uno-card.wild-card .card-value { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.8); }

    .card-back {
      background: linear-gradient(45deg, #333 0%, #111 100%);
      border: 3px solid #ff3366;
    }
    .card-back::after {
      content: 'UNO';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: #ff3366;
      transform: rotate(-10deg);
      border: 2px solid #ff3366;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .card-back::before { display: none; }

    /* Interactions */
    .uno-card:not(.disabled):hover {
      transform: translateY(-20px) scale(1.1);
      z-index: 100;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .uno-card.disabled { opacity: 0.6; cursor: default; }

    .uno-card.playable {
      box-shadow: 0 0 15px rgba(255, 255, 255, 1);
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* --- Layout --- */
    #game-app {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Player Zones */
    .zone {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .zone-bottom { bottom: 10px; left: 0; right: 0; height: 150px; flex-direction: column; }
    .zone-top { top: 10px; left: 0; right: 0; height: 100px; flex-direction: column; }
    .zone-left { left: 10px; top: 0; bottom: 0; width: 100px; flex-direction: row; }
    .zone-right { right: 10px; top: 0; bottom: 0; width: 100px; flex-direction: row; }

    /* Deck & Discard */
    .pile-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .deck-pile { cursor: pointer; transition: transform 0.2s; }
    .deck-pile:hover { transform: scale(1.05); }

    .discard-pile {
      width: var(--card-width);
      height: var(--card-height);
      background: rgba(255,255,255,0.3);
      border-radius: 12px;
      border: 2px dashed rgba(0,0,0,0.2);
      position: relative;
    }
    
    /* Card rotation based on player position */
    .card-from-left { transform: rotate(90deg); }
    .card-from-right { transform: rotate(-90deg); }
    .card-from-top { transform: rotate(180deg); }
    .card-from-bottom { transform: rotate(0deg); }

    /* Hands */
    .hand-container { display: flex; justify-content: center; }
    .hand-container .uno-card { margin: 0 -15px; }
    
    .hand-vertical { display: flex; flex-direction: column; }
    .hand-vertical .uno-card { margin: -40px 0; }
    .hand-vertical .card-back { transform: scale(0.7); }

    /* UI Elements */
    .name-tag {
      background: rgba(255,255,255,0.9);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.8rem;
      color: #333;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 5px;
    }

    .turn-highlight { border: 3px solid #ff3366; color: #ff3366; }

    /* --- UNO Button --- */
    .big-uno-btn {
      position: absolute;
      bottom: 120px;
      right: 20px;
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #ff3366 0%, #ff0000 100%);
      border: 4px solid white;
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: white;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
      opacity: 0.8; pointer-events: all;
      transition: 0.2s;
      z-index: 50;
    }
    .big-uno-btn:active { transform: scale(0.9); }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(5px);
    }
    .modal-box {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      color: #333;
    }

    /* Toast Notification */
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      z-index: 2000;
      transition: transform 0.3s ease;
      pointer-events: none;
      text-align: center;
      line-height: 1.5;
    }
    #toast.show { transform: translate(-50%, -50%) scale(1); }

    /* Team Indicator */
    .team-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .team-a { background: #ff3366; }
    .team-b { background: #4caf50; }
  </style>
</head>
<body>

  <!-- MODE SELECTION SCREEN -->
  <div id="mode-select" class="modal-overlay" style="background: var(--bg-bright);">
    <div class="modal-box" style="background: white;">
      <h1 class="text-4xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500">UNO FUN!</h1>
      <p class="mb-6 text-gray-600">Select Game Mode</p>
      <div class="flex flex-col gap-4">
        <button id="btn-solo" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition shadow-lg">
          🧍 Solo (vs Bots)
        </button>
        <button id="btn-2v2" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold transition shadow-lg">
          👥 2 vs 2 (Team)
        </button>
      </div>
    </div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="lobby" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="text-2xl font-bold mb-4">Lobby</h2>
      <input type="text" id="player-name" value="Player" class="w-full border border-gray-300 rounded-lg p-2 mb-4 text-center" placeholder="Your Name">
      
      <div id="solo-options" class="hidden">
        <label class="block text-sm text-gray-600 mb-2">Number of Opponents (2-3)</label>
        <div class="flex justify-center items-center gap-4 mb-4">
            <button id="btn-bot-minus" class="px-4 py-2 bg-gray-200 rounded-full">-</button>
            <span id="bot-count" class="text-2xl font-bold">3</span>
            <button id="btn-bot-plus" class="px-4 py-2 bg-gray-200 rounded-full">+</button>
        </div>
      </div>

      <div id="team-options" class="hidden text-left text-sm mb-4">
        <p class="mb-2">🟢 <strong>Your Team:</strong> You + Random Bot</p>
        <p>🔴 <strong>Enemy Team:</strong> Bot + Bot</p>
      </div>

      <button id="btn-start" class="w-full py-3 bg-gradient-to-r from-red-500 to-orange-400 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition">
        START & GACHA!
      </button>
      <button id="btn-back" class="w-full mt-2 text-gray-500 text-sm underline">Back</button>
    </div>
  </div>

  <!-- GAME APP -->
  <div id="game-app" class="hidden">
    <!-- Zones -->
    <div id="zone-top" class="zone zone-top"></div>
    <div id="zone-left" class="zone zone-left"></div>
    <div id="zone-right" class="zone zone-right"></div>
    <div id="zone-bottom" class="zone zone-bottom"></div>

    <!-- Center Piles -->
    <div class="pile-container">
      <div class="deck-pile" id="draw-pile" title="Draw Card">
        <div class="uno-card card-back"></div>
      </div>
      <div class="discard-pile" id="discard-pile"></div>
      <div id="color-orb" class="absolute -bottom-8 w-8 h-8 rounded-full border-2 border-white shadow-lg transition-colors"></div>
    </div>

    <button id="uno-btn" class="big-uno-btn">UNO</button>
  </div>

  <!-- COLOR PICKER -->
  <div id="color-picker" class="modal-overlay hidden">
    <div class="modal-box flex flex-col items-center">
      <h3 class="text-xl font-bold mb-4">Choose a Color</h3>
      <div class="grid grid-cols-2 gap-4">
        <button class="w-16 h-16 rounded-full bg-red-500 hover:scale-110 transition" data-color="red"></button>
        <button class="w-16 h-16 rounded-full bg-blue-800 hover:scale-110 transition" data-color="blue"></button>
        <button class="w-16 h-16 rounded-full bg-green-500 hover:scale-110 transition" data-color="green"></button>
        <button class="w-16 h-16 rounded-full bg-yellow-400 hover:scale-110 transition" data-color="yellow"></button>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="game-over" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="winner-text" class="text-4xl font-bold text-green-500 mb-4">YOU WIN!</h2>
      <p id="win-subtitle" class="mb-6">Congrats!</p>
      <button id="btn-restart" class="w-full py-3 bg-blue-500 text-white rounded-xl font-bold">Play Again</button>
      <button id="btn-lobby-back" class="w-full mt-2 text-gray-500 text-sm underline">Main Menu</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast">Message</div>

  <script>
    // --- CONFIG ---
    const COLORS = ['red', 'blue', 'green', 'yellow'];
    const NAMES = ["Alpha", "Bravo", "Charlie", "Delta", "Echo", "Foxtrot", "Golf", "Hotel", "India", "Juliet"];
    
    // --- STATE ---
    let state = {
      deck: [], discard: [], players: [], turn: 0, dir: 1, activeColor: 'red',
      isOver: false, active: false, saidUno: false, pendingWild: null, 
      mode: 'solo', // 'solo' or '2v2'
      positions: [] // Stores which DOM element ID corresponds to player index
    };

    // --- DOM ---
    const $ = id => document.getElementById(id);
    const UI = {
      modeSelect: $('mode-select'), lobby: $('lobby'), game: $('game-app'),
      zones: { top: $('zone-top'), left: $('zone-left'), right: $('zone-right'), bottom: $('zone-bottom') },
      discard: $('discard-pile'), draw: $('draw-pile'),
      colorPicker: $('color-picker'), gameOver: $('game-over'),
      unoBtn: $('uno-btn'), colorOrb: $('color-orb'),
      toast: $('toast')
    };

    // --- AUDIO ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function playSound(type) {
      if(!audioCtx) audioCtx = new AudioCtx();
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      if(type === 'card') { osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(200, t + 0.1); g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1); osc.start(t); osc.stop(t + 0.1); }
      else if(type === 'draw') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, t); g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05); osc.start(t); osc.stop(t + 0.05); }
    }

    // --- UTILS ---
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function showToast(msg) {
      UI.toast.innerText = msg;
      UI.toast.classList.add('show');
      setTimeout(() => UI.toast.classList.remove('show'), 2000);
    }

    // --- DECK ---
    function createDeck() {
      let d = [];
      COLORS.forEach(c => {
        d.push({ c, v: '0' });
        for (let i=1; i<=9; i++) { d.push({c, v: i.toString()}); d.push({c, v: i.toString()}); }
        ['S','R','+2'].forEach(v => { d.push({c, v}); d.push({c, v}); });
      });
      for(let i=0; i<4; i++) { d.push({c: 'black', v: 'W'}); d.push({c: 'black', v: '+4'}); }
      return shuffle(d);
    }

    // --- RENDERING ---
    function renderCard(card, isBack=false) {
      const el = document.createElement('div');
      el.className = `uno-card ${isBack ? 'card-back' : card.c} ${card.c === 'black' ? 'wild-card' : ''}`;
      let sym = card.v;
      if (sym === 'S') sym = '⊘'; if (sym === 'R') sym = '⟲';
      if (!isBack) el.innerHTML = `<span class="card-value">${sym}</span>`;
      return el;
    }

    // Map player index to position key (top, left, right, bottom)
    function getPositionKey(pIdx) {
      // pIdx 0 is always bottom (Player)
      // For 2v2: 0(Bottom), 1(Left), 2(Top), 3(Right)
      // For Solo(3 bots): 0(Bottom), 1(Top), 2(Left), 3(Right) - simplified mapping
      
      if (state.mode === '2v2') {
        const map = ['bottom', 'left', 'top', 'right']; // Standard table order
        return map[pIdx];
      } else {
        // Solo: 0=Bottom, 1=Top, 2=Left, 3=Right
        const map = ['bottom', 'top', 'left', 'right'];
        return map[pIdx];
      }
    }

    function updateUI() {
      // Discard
      const top = state.discard[state.discard.length - 1];
      if (top) {
        UI.discard.innerHTML = '';
        const cardEl = renderCard(top);
        
        // Add rotation class based on who played it? 
        // Ideally we track last player, but for simplicity let's just let it drop straight or random slightly
        // Actually, user requested cards to follow position.
        // We need to know WHO played it. Since we don't store history easily, we approximate or skip.
        // Let's just stick to standard drop for simplicity to avoid complex state history.
        
        UI.discard.appendChild(cardEl);
      }
      
      const cmap = { red: 'var(--uno-red)', blue: 'var(--uno-blue)', green: 'var(--uno-green)', yellow: 'var(--uno-yellow)' };
      UI.colorOrb.style.background = cmap[state.activeColor] || 'transparent';
    }

    function renderHand() {
      // Player Hand (Bottom)
      UI.zones.bottom.innerHTML = '';
      const me = state.players[0];
      const isMyTurn = state.turn === 0;

      // Name Tag
      const tag = document.createElement('div');
      tag.className = `name-tag ${isMyTurn ? 'turn-highlight' : ''}`;
      tag.innerHTML = `<span class="team-indicator ${me.team === 'A' ? 'team-a' : 'team-b'}"></span>${me.name}`;
      UI.zones.bottom.appendChild(tag);

      // Cards
      const handDiv = document.createElement('div');
      handDiv.className = 'hand-container';
      me.hand.forEach((card, idx) => {
        const el = renderCard(card);
        const valid = isMyTurn && checkValidPlay(card);
        if (valid) el.classList.add('playable'); else el.classList.add('disabled');
        el.onclick = () => { if (valid) executePlayerTurn(idx); };
        handDiv.appendChild(el);
      });
      UI.zones.bottom.appendChild(handDiv);
      
      // Card Count
      const count = document.createElement('div');
      count.innerText = `${me.hand.length} cards`;
      count.className = "text-xs font-bold mt-1";
      UI.zones.bottom.appendChild(count);
    }

    function renderBots() {
      // Clear other zones
      UI.zones.top.innerHTML = '';
      UI.zones.left.innerHTML = '';
      UI.zones.right.innerHTML = '';

      state.players.slice(1).forEach((p, i) => {
        const pIdx = i + 1;
        const posKey = getPositionKey(pIdx);
        const zone = UI.zones[posKey];
        
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = 'center';

        const isTurn = state.turn === pIdx;
        
        // Name Tag
        const tag = document.createElement('div');
        tag.className = `name-tag ${isTurn ? 'turn-highlight' : ''}`;
        tag.innerHTML = `<span class="team-indicator ${p.team === 'A' ? 'team-a' : 'team-b'}"></span>${p.name}`;
        wrapper.appendChild(tag);

        // Cards
        const handDiv = document.createElement('div');
        // Rotate hand for left/right
        if (posKey === 'left' || posKey === 'right') {
            handDiv.className = 'hand-vertical';
        } else {
            handDiv.className = 'hand-container';
        }

        // Show just a few backs
        const shownCount = Math.min(p.hand.length, 5);
        for(let k=0; k<shownCount; k++) {
            const back = renderCard(null, true);
            handDiv.appendChild(back);
        }
        wrapper.appendChild(handDiv);

        const count = document.createElement('div');
        count.innerText = `${p.hand.length} cards`;
        count.className = "text-xs font-bold mt-1";
        wrapper.appendChild(count);

        zone.appendChild(wrapper);
      });
    }

    // --- LOGIC ---
    function checkValidPlay(card) {
      const top = state.discard[state.discard.length - 1];
      if (card.c === 'black') return true;
      if (card.c === state.activeColor) return true;
      if (card.v === top.v) return true;
      return false;
    }

    function drawCards(count=1, pIdx) {
      let drawn = [];
      for(let i=0; i<count; i++) {
        if (state.deck.length === 0) {
            if(state.discard.length <= 1) break;
            const top = state.discard.pop();
            state.deck = shuffle(state.discard);
            state.discard = [top];
        }
        if(state.deck.length > 0) drawn.push(state.deck.pop());
      }
      
      // Show toast only if drawing > 1 (penalty)
      if (count > 1) {
        const name = state.players[pIdx].name;
        showToast(`${name} draws ${drawn.length} cards!`);
      }
      
      return drawn;
    }

    function playCard(pIdx, cIdx) {
      const player = state.players[pIdx];
      const card = player.hand.splice(cIdx, 1)[0];
      state.discard.push(card);
      
      playSound('card');

      // Check Win
      if (player.hand.length === 0) {
        setTimeout(() => endGame(pIdx), 500);
        updateUI();
        renderHand();
        renderBots();
        return;
      }

      // UNO Check (Silent penalty)
      if (pIdx === 0 && player.hand.length === 1 && !state.saidUno) {
         // Silent penalty: just draw 2 cards
         setTimeout(() => {
             player.hand.push(...drawCards(2, 0));
             renderHand();
             updateUI();
         }, 300);
      }

      // Handle Wild
      if (card.c === 'black') {
        if (pIdx === 0) {
          state.pendingWild = card;
          UI.colorPicker.classList.remove('hidden');
          updateUI();
          return;
        } else {
          state.activeColor = chooseBotColor(player.hand);
        }
      } else {
        state.activeColor = card.c;
      }

      applyCardEffect(card, pIdx);
      advanceTurn();
    }

    function applyCardEffect(card, currentPIdx) {
        switch(card.v) {
            case 'S': state.turn = getNextPlayerIdx(); break;
            case 'R': 
                state.dir *= -1; 
                if (state.players.length === 2) state.turn = getNextPlayerIdx();
                break;
            case '+2':
                const victimIdx2 = getNextPlayerIdx();
                state.players[victimIdx2].hand.push(...drawCards(2, victimIdx2));
                state.turn = victimIdx2; 
                break;
            case '+4':
                const victimIdx4 = getNextPlayerIdx();
                state.players[victimIdx4].hand.push(...drawCards(4, victimIdx4));
                state.turn = victimIdx4; 
                break;
        }
    }

    function getNextPlayerIdx() {
      let next = state.turn + state.dir;
      if (next >= state.players.length) next = 0;
      if (next < 0) next = state.players.length - 1;
      return next;
    }

    function advanceTurn() {
      state.turn = getNextPlayerIdx();
      state.saidUno = false;
      updateUI();
      renderHand();
      renderBots();
      
      if (state.players[state.turn].isBot) {
        setTimeout(botTurn, 1200);
      }
    }

    // --- BOT AI ---
    function botTurn() {
      if (state.isOver || !state.active) return;
      const p = state.players[state.turn];
      let validMoves = p.hand.map((c, i) => ({c, i})).filter(o => checkValidPlay(o.c));

      if (validMoves.length > 0) {
        validMoves.sort((a, b) => getCardPriority(b.c) - getCardPriority(a.c));
        const choice = validMoves[0];
        playCard(state.turn, choice.i);
      } else {
        // Draw 1
        const drawn = drawCards(1, state.turn);
        if(drawn.length > 0) p.hand.push(...drawn);
        playSound('draw');
        
        const drawnCard = drawn[0];
        if(drawnCard && checkValidPlay(drawnCard)) {
            setTimeout(() => playCard(state.turn, p.hand.length - 1), 800);
        } else {
            advanceTurn();
        }
      }
    }

    function getCardPriority(card) {
        if(card.v === '+4') return 100;
        if(card.v === '+2') return 80;
        if(card.v === 'S' || card.v === 'R') return 50;
        if(card.c !== 'black') return 20;
        return 10;
    }

    function chooseBotColor(hand) {
        let counts = { red: 0, blue: 0, green: 0, yellow: 0 };
        hand.forEach(c => { if (c.c !== 'black') counts[c.c]++; });
        return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
    }

    // --- INITIALIZATION ---
    async function startGame() {
      // UI Transitions
      UI.lobby.classList.add('hidden');
      UI.game.classList.remove('hidden');

      // Init State
      state.deck = createDeck();
      state.discard = [];
      state.turn = 0; 
      state.dir = 1;
      state.isOver = false; 
      state.active = true;
      state.saidUno = false;
      
      // Setup Players
      const pName = $('player-name').value || 'Player';
      // Random names for bots
      const shuffledNames = shuffle([...NAMES]);
      
      state.players = [{name: pName, hand: [], isBot: false, team: 'A'}];

      if (state.mode === 'solo') {
        const count = parseInt($('bot-count').innerText);
        for(let i=0; i<count; i++) {
          state.players.push({name: shuffledNames[i], hand: [], isBot: true, team: 'B'}); // All bots are enemies in solo
        }
      } else {
        // 2v2
        // Player + Bot (Team A)
        state.players.push({name: shuffledNames[0], hand: [], isBot: true, team: 'A'}); 
        // Enemies (Team B)
        state.players.push({name: shuffledNames[1], hand: [], isBot: true, team: 'B'});
        state.players.push({name: shuffledNames[2], hand: [], isBot: true, team: 'B'});
      }

      // Deal Cards
      for(let i=0; i<7; i++) {
        for(let p of state.players) {
          p.hand.push(drawCards(1)[0]); // drawCards(1) returns array
          playSound('draw');
          await sleep(50);
          renderHand(); renderBots(); updateUI();
        }
      }

      // Start Discard
      let start = drawCards(1)[0];
      while(start.c === 'black' || ['S','R','+2'].includes(start.v)) {
        state.deck.unshift(start); state.deck = shuffle(state.deck);
        start = drawCards(1)[0];
      }
      state.discard.push(start);
      state.activeColor = start.c;
      
      updateUI();
      renderHand();
      renderBots();
    }

    function endGame(winnerIdx) {
      state.isOver = true;
      state.active = false;
      const winner = state.players[winnerIdx];
      let txt = `${winner.name} Wins!`;
      let sub = "Game Over";
      
      if (state.mode === '2v2') {
        txt = winner.team === 'A' ? "YOUR TEAM WINS!" : "ENEMY TEAM WINS";
        sub = winner.team === 'A' ? "Congratulations!" : "Better luck next time.";
      }
      
      $('winner-text').innerText = txt;
      $('win-subtitle').innerText = sub;
      UI.gameOver.classList.remove('hidden');
    }

    function executePlayerTurn(cardIndex) {
      if (state.turn !== 0 || state.isOver || !state.active) return;
      playCard(0, cardIndex);
    }

    // --- EVENT LISTENERS ---
    
    // Mode Selection
    $('btn-solo').onclick = () => {
      state.mode = 'solo';
      $('solo-options').classList.remove('hidden');
      $('team-options').classList.add('hidden');
      UI.modeSelect.classList.add('hidden');
      UI.lobby.classList.remove('hidden');
    };
    
    $('btn-2v2').onclick = () => {
      state.mode = '2v2';
      $('solo-options').classList.add('hidden');
      $('team-options').classList.remove('hidden');
      UI.modeSelect.classList.add('hidden');
      UI.lobby.classList.remove('hidden');
    };

    $('btn-back').onclick = () => {
      UI.lobby.classList.add('hidden');
      UI.modeSelect.classList.remove('hidden');
    };

    $('btn-bot-plus').onclick = () => {
      let v = parseInt($('bot-count').innerText);
      if(v < 3) $('bot-count').innerText = v+1;
    };
    $('btn-bot-minus').onclick = () => {
      let v = parseInt($('bot-count').innerText);
      if(v > 2) $('bot-count').innerText = v-1;
    };

    $('btn-start').onclick = startGame;

    $('btn-restart').onclick = () => {
      UI.gameOver.classList.add('hidden');
      startGame();
    };
    $('btn-lobby-back').onclick = () => {
      UI.gameOver.classList.add('hidden');
      UI.game.classList.add('hidden');
      UI.modeSelect.classList.remove('hidden');
    };

    UI.draw.onclick = () => {
      if (state.turn !== 0 || state.isOver || !state.active) return;
      
      // Draw 1
      const drawn = drawCards(1, 0);
      if(drawn.length > 0) state.players[0].hand.push(...drawn);
      playSound('draw');
      
      renderHand();
      
      // Check if playable
      const drawnCard = drawn[0];
      if(drawnCard && checkValidPlay(drawnCard)) {
        // Allow playing
      } else {
        advanceTurn(); 
      }
    };

    UI.unoBtn.onclick = () => {
      state.saidUno = true;
      // Visual feedback
      UI.unoBtn.style.transform = "scale(0.9)";
      setTimeout(() => UI.unoBtn.style.transform = "", 200);
    };

    document.querySelectorAll('#color-picker button').forEach(b => {
      b.onclick = () => {
        state.activeColor = b.dataset.color;
        UI.colorPicker.classList.add('hidden');
        applyCardEffect(state.pendingWild, 0);
        state.pendingWild = null;
        advanceTurn();
      };
    });

  </script>
</body>
</html>
